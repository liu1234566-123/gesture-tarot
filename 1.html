<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势交互：命运塔罗牌</title>
    
    <!-- 引入 MediaPipe 手势识别所需库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
            color: #fff;
            width: 100vw;
            height: 100vh;
        }

        /* 隐藏摄像头视频，我们只需要它的数据 */
        .input_video {
            display: none;
        }

        /* 粒子背景画布 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* 手部追踪反馈光标 */
        #hand-cursor {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(147,112,219,0.8) 0%, rgba(75,0,130,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            transition: width 0.3s, height 0.3s, background 0.3s;
            opacity: 0;
        }
        
        /* 握拳时的手部光标样式 */
        #hand-cursor.fist {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,215,0,0.9) 0%, rgba(218,165,32,0) 70%);
        }

        /* 塔罗牌容器 */
        #tarot-stage {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100vw;
            height: 400px;
            transform: translateY(-50%);
            perspective: 1000px;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        #tarot-track {
            position: absolute;
            display: flex;
            gap: 40px;
            left: 50%; /* 初始位置对齐屏幕中央 */
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* 塔罗牌样式 */
        .card {
            width: 220px;
            height: 360px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            transform-origin: center center;
            cursor: pointer;
        }

        /* 居中翻开时的样式 */
        .card.active {
            transform: rotateY(180deg) scale(1.3) translateY(-20px);
            z-index: 100;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #b8860b;
        }

        /* 卡背（初始状态） */
        .card-back {
            background: linear-gradient(135deg, #1a0b2e, #4b0082);
            background-size: 20px 20px;
            background-image: repeating-linear-gradient(45deg, #2a114f 0, #2a114f 2px, transparent 2px, transparent 10px);
            color: #daa520;
            font-size: 40px;
        }

        .card-back::after {
            content: '✧';
            font-size: 80px;
            opacity: 0.5;
        }

        /* 卡面（翻开状态） */
        .card-front {
            background: #f4e8d6;
            color: #2c1e16;
            transform: rotateY(180deg);
            padding: 15px;
            text-align: center;
            background-image: radial-gradient(circle at center, #fffdf8 0%, #e6d3b3 100%);
        }

        .card-front .symbol {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }

        .card-front .title {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid #2c1e16;
            border-bottom: 1px solid #2c1e16;
            padding: 5px 0;
            width: 80%;
        }

        /* UI 提示信息 */
        #ui-layer {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100vw;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }

        #status-text {
            font-size: 18px;
            color: #daa520;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: color 0.3s;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }
        
        .loader {
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-left-color: #daa520;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div id="loading">
        <div class="loader"></div>
        <div style="color: #daa520; letter-spacing: 2px; font-size: 18px;">正在连接灵魂之眼(摄像头)并加载手势模型...</div>
        <div style="color: #888; margin-top: 10px; font-size: 14px;">请允许浏览器访问摄像头</div>
    </div>

    <!-- UI 提示 -->
    <div id="ui-layer">
        <div id="status-text">✦ 举起手掌：左右滑动以拨动命运轮盘 | 握紧拳头：揭晓命运之牌 ✦</div>
    </div>

    <!-- 粒子背景 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 手部反馈点 -->
    <div id="hand-cursor"></div>

    <!-- 塔罗牌舞台 -->
    <div id="tarot-stage">
        <div id="tarot-track">
            <!-- 卡牌将由 JS 动态生成 -->
        </div>
    </div>

    <video class="input_video" autoplay playsinline></video>

    <script>
        // ==========================================
        // 1. 塔罗牌数据与渲染逻辑
        // ==========================================
        const tarotData = [
            { title: "The Fool", symbol: "🃏" },
            { title: "The Magician", symbol: "🪄" },
            { title: "The High Priestess", symbol: "🌙" },
            { title: "The Empress", symbol: "👑" },
            { title: "The Emperor", symbol: "🦅" },
            { title: "The Lovers", symbol: "❤️" },
            { title: "The Chariot", symbol: "🐎" },
            { title: "Strength", symbol: "🦁" },
            { title: "The Hermit", symbol: "🏮" },
            { title: "Wheel of Fortune", symbol: "☸️" },
            { title: "Justice", symbol: "⚖️" },
            { title: "The Hanged Man", symbol: "🪢" },
            { title: "Death", symbol: "💀" },
            { title: "Temperance", symbol: "🕊️" },
            { title: "The Devil", symbol: "🐐" },
            { title: "The Tower", symbol: "🌩️" },
            { title: "The Star", symbol: "⭐" },
            { title: "The Moon", symbol: "🌚" },
            { title: "The Sun", symbol: "☀️" },
            { title: "Judgement", symbol: "📯" },
            { title: "The World", symbol: "🌍" }
        ];

        const track = document.getElementById('tarot-track');
        const cardWidth = 220;
        const cardGap = 40;
        const itemWidth = cardWidth + cardGap;
        
        // 为了实现无限滚动，我们复制三份卡组
        const displayDeck = [...tarotData, ...tarotData, ...tarotData];
        const deckMidIndex = tarotData.length; // 中间卡组的起始索引
        const trackTotalWidth = displayDeck.length * itemWidth;
        
        // 生成DOM
        displayDeck.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-face card-back"></div>
                <div class="card-face card-front">
                    <div class="symbol">${data.symbol}</div>
                    <div class="title">${data.title}</div>
                </div>
            `;
            track.appendChild(card);
        });

        const cards = document.querySelectorAll('.card');

        // ==========================================
        // 2. 交互状态控制 (核心物理引擎)
        // ==========================================
        let currentScrollX = - (deckMidIndex * itemWidth); // 初始位置放在第二组开头
        let baseVelocity = -1.5; // 持续向左滚动的初速度
        let targetVelocity = baseVelocity;
        let currentVelocity = baseVelocity;
        
        let isFastScrolling = false; // 新增：是否处于持续快速滚动状态
        let isFistClosed = false;
        let selectedIndex = -1; // 当前被选中的卡牌
        let snapTargetX = null; // 吸附目标的X坐标

        let handX = window.innerWidth / 2;
        let handY = window.innerHeight / 2;
        let prevHandX = window.innerWidth / 2;
        
        // 动画主循环
        function animate() {
            // 速度平滑过渡 (摩擦力/惯性)
            currentVelocity += (targetVelocity - currentVelocity) * 0.1;

            if (isFistClosed) {
                // 握拳时，如果有吸附目标，平滑吸附到目标位置
                if (snapTargetX !== null) {
                    currentScrollX += (snapTargetX - currentScrollX) * 0.15;
                }
            } else {
                // 未握拳时，正常滚动
                currentScrollX += currentVelocity;
                
                // 无限滚动逻辑：如果滚动超过了前后边界，重置到中间组的对应位置，实现无缝循环
                const loopBounds = tarotData.length * itemWidth;
                if (currentScrollX > 0) {
                    currentScrollX -= loopBounds;
                } else if (currentScrollX < -(trackTotalWidth - loopBounds)) {
                    currentScrollX += loopBounds;
                }
                
                // 根据是否快速滑动状态，保持对应的目标速度
                targetVelocity = isFastScrolling ? -12 : baseVelocity;
                snapTargetX = null;
            }

            // 应用 Transform
            track.style.transform = `translateX(${currentScrollX}px)`;

            // 握拳选中逻辑
            if (isFistClosed && snapTargetX === null) {
                // 找到最靠近屏幕中央的卡牌
                let minOffset = Infinity;
                let closestIdx = -1;
                
                cards.forEach((card, idx) => {
                    // 计算每张卡牌中心相较于视口中心的相对位置
                    const cardCenterGlobalX = (window.innerWidth / 2) + currentScrollX + (idx * itemWidth) + (cardWidth / 2);
                    const distToCenter = Math.abs(cardCenterGlobalX - window.innerWidth / 2);
                    
                    if (distToCenter < minOffset) {
                        minOffset = distToCenter;
                        closestIdx = idx;
                    }
                });

                if (closestIdx !== -1) {
                    // 计算需要将该卡牌完全居中的 ScrollX 偏移量
                    snapTargetX = - (closestIdx * itemWidth) - (cardWidth / 2); 
                    
                    if (selectedIndex !== closestIdx) {
                        // 移除之前的选中状态
                        if(selectedIndex !== -1) cards[selectedIndex].classList.remove('active');
                        selectedIndex = closestIdx;
                        cards[selectedIndex].classList.add('active');
                        document.getElementById('status-text').innerText = `✦ 命运的启示: ${displayDeck[selectedIndex].title} ✦`;
                        document.getElementById('status-text').style.color = "#fff";
                    }
                }
            } else if (!isFistClosed && selectedIndex !== -1) {
                // 松开拳头，取消选中
                cards[selectedIndex].classList.remove('active');
                selectedIndex = -1;
                document.getElementById('status-text').innerText = "✦ 举起手掌：左右滑动以拨动命运轮盘 | 握紧拳头：揭晓命运之牌 ✦";
                document.getElementById('status-text').style.color = "#daa520";
            }

            requestAnimationFrame(animate);
        }

        // ==========================================
        // 3. Canvas 粒子背景 (受手势影响)
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = `rgba(${Math.random()*100 + 100}, ${Math.random()*50}, ${Math.random()*200 + 55}, ${Math.random()*0.5 + 0.2})`;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // 粒子与手势的斥力互动
                let dx = handX - this.x;
                let dy = handY - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                // 斥力半径
                let maxDistance = 200;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < maxDistance) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 20;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 20;
                    }
                }
                
                // 缓慢的背景漂移
                this.baseX -= 0.5;
                if(this.baseX < 0) {
                    this.baseX = canvas.width;
                    this.x = canvas.width;
                }

                this.draw();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ==========================================
        // 4. MediaPipe 手势识别逻辑
        // ==========================================
        const videoElement = document.querySelector('.input_video');
        const handCursor = document.getElementById('hand-cursor');

        // 计算两点之间的距离 (用于判断握拳)
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        // 判断是否握拳
        function detectFist(landmarks) {
            const wrist = landmarks[0];
            // 获取四个指尖 (8:食指, 12:中指, 16:无名指, 20:小指)
            // 和对应的掌指关节 (5, 9, 13, 17)
            const tips = [8, 12, 16, 20];
            const mcps = [5, 9, 13, 17];
            
            let foldedCount = 0;
            for (let i = 0; i < tips.length; i++) {
                // 如果指尖到手腕的距离 小于 掌指关节到手腕的距离，说明手指弯曲收起了
                if (getDistance(landmarks[tips[i]], wrist) < getDistance(landmarks[mcps[i]], wrist)) {
                    foldedCount++;
                }
            }
            // 如果3个或以上手指弯曲，判定为握拳
            return foldedCount >= 3;
        }

        function onResults(results) {
            // 隐藏加载画面
            const loadingFrame = document.getElementById('loading');
            if (!loadingFrame.classList.contains('hidden')) {
                loadingFrame.classList.add('hidden');
                // 启动卡牌动画
                animate(); 
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 提取手掌中心位置 (使用 9 号点，中指掌指关节)
                // 注意：摄像头默认是镜像的，所以 X 轴要反转
                const rawX = (1 - landmarks[9].x) * window.innerWidth;
                const rawY = landmarks[9].y * window.innerHeight;

                // 平滑光标位置
                handX += (rawX - handX) * 0.3;
                handY += (rawY - handY) * 0.3;

                handCursor.style.opacity = 1;
                handCursor.style.left = `${handX}px`;
                handCursor.style.top = `${handY}px`;

                // 1. 判断握拳
                isFistClosed = detectFist(landmarks);
                if (isFistClosed) {
                    handCursor.classList.add('fist');
                    targetVelocity = 0; // 停止滚动，交由吸附逻辑处理
                    isFastScrolling = false; // 握拳时重置快速滚动状态
                } else {
                    handCursor.classList.remove('fist');
                    
                    // 2. 判断滑动 (Swipe) - 仅在未握拳时生效
                    let deltaX = handX - prevHandX;
                    
                    // 如果向左滑动，开启持续快速滚动模式
                    if (deltaX < -5) {
                        isFastScrolling = true;
                    } 
                    // 如果向右滑动，则取消快速滚动，恢复常速
                    else if (deltaX > 5) {
                        isFastScrolling = false;
                    }
                }
                
                prevHandX = handX;
            } else {
                // 未检测到手
                handCursor.style.opacity = 0;
                isFistClosed = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1, // 只识别一只手
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // 启动摄像头
        camera.start().catch(err => {
            console.error("Camera error:", err);
            document.getElementById('status-text').innerText = "无法访问摄像头，请检查权限。";
            document.getElementById('status-text').style.color = "red";
            document.getElementById('loading').innerHTML = "<div style='color:red;'>无法获取摄像头权限，交互已终止。</div>";
        });

    </script>
</body>
</html>
