    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;600&display=swap');

        :root {
            --gold: #ffcc33;
            --gold-glow: rgba(255, 204, 51, 0.5);
            --bg-dark: #030308;
            --card-w: 200px;
            --card-h: 340px;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #f0e6cc;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            user-select: none;
        }

        #star-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at center, #0e061a 0%, #030308 100%);
        }

        .stage {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .stage.active { display: flex; }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 600px;
            perspective: 2000px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        #cards-track {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tarot-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 16px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, box-shadow 0.4s;
            will-change: transform;
            cursor: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: none;
        }

        .is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 204, 51, 0.3);
            overflow: hidden;
        }

        .card-back {
            background: radial-gradient(circle at center, #1b1b3a 0%, #080815 100%);
            z-index: 2;
        }
        .card-back svg {
            width: 60%;
            stroke: var(--gold);
            fill: none;
            opacity: 0.8;
        }

        .card-front {
            background: #ffffff;
            color: #000000;
            transform: rotateY(180deg);
            padding: 24px;
            z-index: 1;
        }
        
        .card-front .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .card-front .card-name {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-top: 10px;
            text-align: center;
        }

        .card-front .divider {
            width: 40px;
            height: 2px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        .card-dissipating {
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease, filter 1s ease !important;
            transform: translate3d(0, -120vh, 800px) rotateY(0deg) scale(0.1) !important;
            opacity: 0 !important;
            filter: blur(20px) brightness(3) !important;
            z-index: 9999 !important;
        }

        .gold-btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            background: rgba(255, 204, 51, 0.05);
            transition: all 0.3s;
            letter-spacing: 0.5em;
        }
        .gold-btn:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px var(--gold-glow);
        }

        #custom-cursor {
            position: fixed;
            width: 32px; height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }
        #custom-cursor.grabbing {
            transform: translate(-50%, -50%) scale(0.6);
            background: var(--gold);
            border-color: white;
            box-shadow: 0 0 30px var(--gold);
        }

        #decoding-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: var(--gold);
        }

        .pulse-text {
            animation: pulse 2s infinite ease-in-out;
            letter-spacing: 0.8em;
            text-indent: 0.8em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* 报告页修饰 */
        .ai-insight-box {
            background: rgba(255, 204, 51, 0.03);
            border: 1px solid rgba(255, 204, 51, 0.1);
            position: relative;
        }
        .ai-insight-box::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 60px;
            color: var(--gold);
            opacity: 0.2;
            font-family: serif;
        }
    </style>
</head>

            { name: "星币四", emoji: "🔒", desc: "保守的持有，防御的心态。", detail: "过度紧握财富或安全感会让你变得吝啬和固执。" },

            { name: "星币六", emoji: "🤝", desc: "慷慨的施与，公平的分配。", detail: "你拥有盈余。通过分享和乐善好施来维持能量平衡。" },
            { name: "星币七", emoji: "🍇", desc: "耐心的评估，长期的积累。", detail: "暂停脚步，审视你的收成。深耕细作终会有果。" },
            { name: "星币八", emoji: "🛠️", desc: "工匠的精神，专注的修行。", detail: "潜心钻研你的技能，精益求精是通向大师的唯一途径。" },
            { name: "星币九", emoji: "🦅", desc: "独立的富足，优雅的享受。", detail: "你赢得了自由和安逸。享受你自己创造出的完美花园。" },
            { name: "星币十", emoji: "🏰", desc: "传承的稳固，家族的基石。", detail: "不仅是眼前的成功，更是可以流传后世的稳定根基。" },
            { name: "星币侍从", emoji: "🌱", desc: "踏实的学子，财富的幼苗。", detail: "一个务实的新想法或一份关于财务、学业的好消息。" },
            { name: "星币骑士", emoji: "🐂", desc: "勤勉的耕耘，稳健的推进。", detail: "慢即是快。通过坚持不懈的日常努力达成目标。" },
            { name: "星币皇后", emoji: "🧺", desc: "慷慨的哺育，务实的慈悲。", detail: "打理好你的现实生活，给身边的人带来温暖和丰盛。" },
            { name: "星币国王", emoji: "🏛️", desc: "物质的领主，成功的巅峰。", detail: "你已达到事业的顶峰。用你的慷慨和远见来保护你的领土。" }
        ];

        let userQuestion = "";
        let drawnCards = [];
        let grabbedCardEl = null;
        let isLocking = false; 
        let scrollOffset = 0;
        let speed = 2.0;
        const TOTAL_CARDS = TAROT_DATA.length;
        const CARD_GAP = 280; 
        const TRACK_W = TOTAL_CARDS * CARD_GAP;

        function initStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let stars = Array(120).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                s: Math.random()*2, o: Math.random()
            }));
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stars.forEach(s => {
                    s.y -= 0.15; if(s.y < 0) s.y = canvas.height;
                    ctx.fillStyle = `rgba(255,204,51,${Math.sin(Date.now()*0.001 + s.o*10)*0.3 + 0.3})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function onStart() {
            userQuestion = document.getElementById('q-input').value;
            if(userQuestion.trim().length < 1) return;
            document.getElementById('display-q').innerText = userQuestion;
            document.getElementById('stage-input').classList.remove('active');
            document.getElementById('stage-draw').classList.add('active');
            createTrack();
            initAI();
            renderLoop();
        }

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "你是一位精通塔罗占卜的占星大师。你的语气优雅、神秘、充满智慧且富有启发性。请根据用户的问题和抽到的三张牌（现状、挑战、未来）进行整合解析，字数约200-300字。不要使用Markdown格式标题，只返回纯文本。" }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "宇宙的讯息似乎暂时被迷雾遮挡，请凭直觉解读卡牌。";
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return "链接星空的路径已断开，请通过心之眼自行解读。";
        }

        function createTrack() {
            const track = document.getElementById('cards-track');
            for(let i=0; i<TOTAL_CARDS; i++) {
                const data = TAROT_DATA[i];
                const card = document.createElement('div');
                card.className = 'tarot-card';
                card.dataset.id = i;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke-dasharray="2,2"/><path d="M50 5 L90 75 L10 75 Z"/><path d="M50 95 L10 25 L90 25 Z"/></svg>
                        </div>
                        <div class="card-face card-front">
                            <div class="emoji">${data.emoji}</div>
                            <div class="divider"></div>
                            <div class="card-name">${data.name}</div>
                        </div>
                    </div>
                `;
                track.appendChild(card);
            }
        }

        function renderLoop() {
            if(!grabbedCardEl) {
                scrollOffset -= speed;
                if(Math.abs(scrollOffset) >= TRACK_W) scrollOffset = 0;
                if(speed > 2.0) speed *= 0.985;
            }

            const cards = document.querySelectorAll('.tarot-card:not(.card-dissipating)');
            cards.forEach((el, i) => {
                if(el === grabbedCardEl) return;

                let x = (i * CARD_GAP + scrollOffset);
                x = ((x + TRACK_W/2) % TRACK_W + TRACK_W) % TRACK_W - TRACK_W/2;

                const z = -Math.abs(x) * 0.8 - 200; 
                const rotY = (x / 800) * -35;

                el.style.transform = `translate3d(${x}px, 0, ${z}px) rotateY(${rotY}deg)`;
                el.style.opacity = "1"; 
                
                const inner = el.querySelector('.card-face');
                if(Math.abs(x) < 100) {
                    inner.style.borderColor = `rgba(255, 204, 51, 1)`;
                    el.style.boxShadow = `0 0 30px rgba(255, 204, 51, 0.4)`;
                } else {
                    inner.style.borderColor = `rgba(255, 204, 51, 0.2)`;
                    el.style.boxShadow = `none`;
                }
            });
            requestAnimationFrame(renderLoop);
        }

        function handleGrab() {
            if(grabbedCardEl || isLocking || drawnCards.length >= 3) return;
            let target = null;
            let minDist = Infinity;
            document.querySelectorAll('.tarot-card:not(.card-dissipating)').forEach(el => {
                const matrix = new WebKitCSSMatrix(window.getComputedStyle(el).transform);
                const currentX = matrix.m41; 
                if(Math.abs(currentX) < minDist) { minDist = Math.abs(currentX); target = el; }
            });

            if(target) {
                grabbedCardEl = target;
                grabbedCardEl.classList.add('is-flipped');
                grabbedCardEl.style.zIndex = "1000";
                grabbedCardEl.style.transform = `translate3d(0, 0, 600px) rotateY(0deg) scale(1.1)`;
                document.getElementById('status-tag').innerText = "锁定命运中...";
            }
        }

        function handleRelease() {
            if(!grabbedCardEl || isLocking) return;
            isLocking = true;
            
            const id = parseInt(grabbedCardEl.dataset.id);
            drawnCards.push(TAROT_DATA[id]);
            
            const dots = document.querySelectorAll('#progress-dots div');
            drawnCards.forEach((_, i) => {
                dots[i].style.background = "#ffcc33";
                dots[i].style.boxShadow = "0 0 15px #ffcc33";
                dots[i].style.borderColor = "#ffcc33";
            });

            if(grabbedCardEl) {
                grabbedCardEl.classList.add('card-dissipating');
            }
            
            setTimeout(() => {
                if(grabbedCardEl) {
                    grabbedCardEl.remove();
                    grabbedCardEl = null;
                }
                isLocking = false;
                speed = 20; 
                if(drawnCards.length >= 3) {
                    prepareReport();
                } else {
                    document.getElementById('status-tag').innerText = `已获取 ${drawnCards.length}/3`;
                }
            }, 1200);
        }

        async function prepareReport() {
            const overlay = document.getElementById('decoding-overlay');
            const statusText = document.getElementById('decode-status');
            overlay.style.display = 'flex';
            
            statusText.innerText = "正在链接宇宙能量...";
            
            // 构建 Prompt
            const prompt = `用户的问题是：“${userQuestion}”。
            抽到的三张牌如下：
            1. 现状：${drawnCards[0].name} (${drawnCards[0].desc})
            2. 挑战：${drawnCards[1].name} (${drawnCards[1].desc})
            3. 未来：${drawnCards[2].name} (${drawnCards[2].desc})
            
            请结合卡牌含义，对用户的问题进行深度解答和建议。`;

            // 异步调用 API
            const aiInsightPromise = callMinimax(prompt);
            
            // 为了仪式感，至少等待2.5秒
            const [aiResult] = await Promise.all([
                aiInsightPromise,
                new Promise(resolve => setTimeout(resolve, 2500))
            ]);

            overlay.style.display = 'none';
            showFinalReport(aiResult);
        }

        function showFinalReport(aiContent) {
            document.getElementById('stage-draw').classList.remove('active');
            document.getElementById('stage-report').classList.add('active');
            
            // 保存 AI 文本备用
            document.getElementById('ai-text-content').innerText = aiContent;

            const list = document.getElementById('card-results-display');
            list.innerHTML = ""; 

            drawnCards.forEach((card, i) => {
                const stageName = i === 0 ? "一、现状" : i === 1 ? "二、挑战" : "三、未来";
                list.innerHTML += `
                    <div class="flex flex-col items-center opacity-0 translate-y-10 transition-all duration-1000" style="transition-delay: ${i*400}ms">
                        <div class="w-40 h-64 md:w-48 md:h-80 bg-white rounded-2xl flex flex-col items-center justify-center p-6 text-black shadow-[0_20px_50px_rgba(255,204,51,0.2)] mb-6 transform hover:scale-105 transition-transform duration-500">
                            <div class="text-6xl md:text-7xl mb-4">${card.emoji}</div>
                            <div class="w-12 h-0.5 bg-gray-200 mb-4"></div>
                            <div class="text-lg md:text-xl font-bold tracking-widest">${card.name}</div>
                        </div>
                        <div class="text-center px-4 w-full max-w-[200px]">
                            <div class="text-[#ffcc33] text-xs tracking-[0.3em] mb-3 font-bold uppercase">${stageName}</div>
                            <p class="text-[#f0e6cc]/80 text-sm italic leading-relaxed">“${card.desc}”</p>
                        </div>
                    </div>
                `;
            });
            
            // 触发卡牌入场动画
            setTimeout(() => {
                list.querySelectorAll('.opacity-0').forEach(el => el.classList.remove('opacity-0', 'translate-y-10'));
            }, 100);

            // 卡牌显示完毕后，出现"开启文字解析"按钮
            setTimeout(() => {
                const btnArea = document.getElementById('unlock-ai-btn-area');
                btnArea.classList.remove('hidden');
                setTimeout(() => {
                    btnArea.classList.remove('opacity-0');
                }, 50);
            }, drawnCards.length * 400 + 800);
        }

        function revealAIInsight() {
            const btnArea = document.getElementById('unlock-ai-btn-area');
            const box = document.getElementById('ai-summary-box');

            btnArea.style.opacity = '0';
            setTimeout(() => {
                btnArea.classList.add('hidden');
                box.classList.remove('hidden');
                setTimeout(() => {
                    box.classList.remove('opacity-0', 'translate-y-8');
                    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 50);
            }, 500);
        }

        async function callMinimax(prompt) {
            const url = "https://api.minimaxi.com/v1/chat/completions";
            const payload = {
                model: modelName,
                messages: [
                    {
                        role: "system",
                        content: "你是一位精通塔罗占卜的占星大师。你的语气优雅、神秘、充满智慧且富有启发性。请根据用户的问题和抽到的三张牌（现状、挑战、未来）进行整合解析，字数约200-300字。不要使用Markdown格式标题，只返回纯文本。"
                    },
                    {
                        role: "user",
                        content: prompt
                    }
                ]
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.choices && result.choices.length > 0) {
                        return result.choices[0].message.content;
                    }
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return "链接星空的路径已断开，请通过心之眼自行解读。";
        }

        function initAI() {
            const video = document.getElementById('v-preview');
            const cursor = document.getElementById('custom-cursor');
            let lastX = null;
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7});
            hands.onResults((res) => {
                if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    const h = res.multiHandLandmarks[0];
                    const x = (1 - h[0].x) * window.innerWidth;
                    const y = h[0].y * window.innerHeight;
                    cursor.style.left = `${x}px`; cursor.style.top = `${y}px`;
                    cursor.style.opacity = 1;
                    const isFist = [8, 12, 16, 20].every(i => h[i].y > h[i-2].y);
                    if(isFist && !cursor.classList.contains('grabbing')) {
                        cursor.classList.add('grabbing'); handleGrab();
                    } else if(!isFist && cursor.classList.contains('grabbing')) {
                        cursor.classList.remove('grabbing'); handleRelease();
                    }
                    if(lastX !== null && !grabbedCardEl) {
                        const dx = Math.abs(h[0].x - lastX);
                        if(dx > 0.02) speed = Math.min(speed + dx*80, 40);
                    }
                    lastX = h[0].x;
                } else { cursor.style.opacity = 0; }
            });
            new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            }).start();
        }

        window.onload = initStars;
    </script>
