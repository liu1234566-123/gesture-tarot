<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心乐之予 - 命运指引</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;600&display=swap');

        :root {
            --gold: #ffcc33;
            --gold-glow: rgba(255, 204, 51, 0.5);
            --bg-dark: #030308;
            --card-w: 200px;
            --card-h: 340px;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #f0e6cc;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            user-select: none;
        }

        #star-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at center, #0e061a 0%, #030308 100%);
        }

        .stage {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .stage.active { display: flex; }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 600px;
            perspective: 2000px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        #cards-track {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tarot-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 16px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, box-shadow 0.4s;
            will-change: transform;
            cursor: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: none;
        }

        .is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 204, 51, 0.3);
            overflow: hidden;
        }

        .card-back {
            background: radial-gradient(circle at center, #1b1b3a 0%, #080815 100%);
            z-index: 2;
        }
        .card-back svg {
            width: 60%;
            stroke: var(--gold);
            fill: none;
            opacity: 0.8;
        }

        .card-front {
            background: #ffffff;
            color: #000000;
            transform: rotateY(180deg);
            padding: 24px;
            z-index: 1;
        }
        
        .card-front .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .card-front .card-name {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-top: 10px;
            text-align: center;
        }

        .card-front .divider {
            width: 40px;
            height: 2px;
            background: #e5e7eb;
            margin: 15px 0;
        }

        .card-dissipating {
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease, filter 1s ease !important;
            transform: translate3d(0, -120vh, 800px) rotateY(0deg) scale(0.1) !important;
            opacity: 0 !important;
            filter: blur(20px) brightness(3) !important;
            z-index: 9999 !important;
        }

        .gold-btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            background: rgba(255, 204, 51, 0.05);
            transition: all 0.3s;
            letter-spacing: 0.5em;
        }
        .gold-btn:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px var(--gold-glow);
        }

        #custom-cursor {
            position: fixed;
            width: 32px; height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }
        #custom-cursor.grabbing {
            transform: translate(-50%, -50%) scale(0.6);
            background: var(--gold);
            border-color: white;
            box-shadow: 0 0 30px var(--gold);
        }

        #decoding-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: var(--gold);
        }

        .pulse-text {
            animation: pulse 2s infinite ease-in-out;
            letter-spacing: 0.8em;
            text-indent: 0.8em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .ai-insight-box {
            background: rgba(255, 204, 51, 0.03);
            border: 1px solid rgba(255, 204, 51, 0.1);
            position: relative;
        }
        .ai-insight-box::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 60px;
            color: var(--gold);
            opacity: 0.2;
            font-family: serif;
        }
    </style>
</head>

        let userQuestion = "";
        let drawnCards = [];
        let grabbedCardEl = null;
        let isLocking = false; 
        let scrollOffset = 0;
        let speed = 2.0;
        const TOTAL_CARDS = TAROT_DATA.length;
        const CARD_GAP = 280; 
        const TRACK_W = TOTAL_CARDS * CARD_GAP;

        function initStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let stars = Array(120).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                s: Math.random()*2, o: Math.random()
            }));
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stars.forEach(s => {
                    s.y -= 0.15; if(s.y < 0) s.y = canvas.height;
                    ctx.fillStyle = `rgba(255,204,51,${Math.sin(Date.now()*0.001 + s.o*10)*0.3 + 0.3})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function onStart() {
            userQuestion = document.getElementById('q-input').value;
            if(userQuestion.trim().length < 1) return;
            document.getElementById('display-q').innerText = userQuestion;
            document.getElementById('stage-input').classList.remove('active');
            document.getElementById('stage-draw').classList.add('active');
            createTrack();
            initAI();
            renderLoop();
        }

        function createTrack() {
            const track = document.getElementById('cards-track');
            for(let i=0; i<TOTAL_CARDS; i++) {
                const data = TAROT_DATA[i];
                const card = document.createElement('div');
                card.className = 'tarot-card';
                card.dataset.id = i;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke-dasharray="2,2"/><path d="M50 5 L90 75 L10 75 Z"/><path d="M50 95 L10 25 L90 25 Z"/></svg>
                        </div>
                        <div class="card-face card-front">
                            <div class="emoji">${data.emoji}</div>
                            <div class="divider"></div>
                            <div class="card-name">${data.name}</div>
                        </div>
                    </div>
                `;
                track.appendChild(card);
            }
        }

        function renderLoop() {
            if(!grabbedCardEl) {
                scrollOffset -= speed;
                if(Math.abs(scrollOffset) >= TRACK_W) scrollOffset = 0;
                if(speed > 2.0) speed *= 0.985;
            }

            const cards = document.querySelectorAll('.tarot-card:not(.card-dissipating)');
            cards.forEach((el, i) => {
                if(el === grabbedCardEl) return;

                let x = (i * CARD_GAP + scrollOffset);
                x = ((x + TRACK_W/2) % TRACK_W + TRACK_W) % TRACK_W - TRACK_W/2;

                const z = -Math.abs(x) * 0.8 - 200; 
                const rotY = (x / 800) * -35;

                el.style.transform = `translate3d(${x}px, 0, ${z}px) rotateY(${rotY}deg)`;
                
                const inner = el.querySelector('.card-face');
                if(Math.abs(x) < 100) {
                    inner.style.borderColor = `rgba(255, 204, 51, 1)`;
                    el.style.boxShadow = `0 0 30px rgba(255, 204, 51, 0.4)`;
                } else {
                    inner.style.borderColor = `rgba(255, 204, 51, 0.2)`;
                    el.style.boxShadow = `none`;
                }
            });
            requestAnimationFrame(renderLoop);
        }

        function handleGrab() {
            if(grabbedCardEl || isLocking || drawnCards.length >= 3) return;
            let target = null;
            let minDist = Infinity;
            document.querySelectorAll('.tarot-card:not(.card-dissipating)').forEach(el => {
                const matrix = new WebKitCSSMatrix(window.getComputedStyle(el).transform);
                const currentX = matrix.m41; 
                if(Math.abs(currentX) < minDist) { minDist = Math.abs(currentX); target = el; }
            });

            if(target) {
                grabbedCardEl = target;
                grabbedCardEl.classList.add('is-flipped');
                grabbedCardEl.style.zIndex = "1000";
                grabbedCardEl.style.transform = `translate3d(0, 0, 600px) rotateY(0deg) scale(1.1)`;
                document.getElementById('status-tag').innerText = "锁定命运中...";
            }
        }

        function handleRelease() {
            if(!grabbedCardEl || isLocking) return;
            isLocking = true;
            
            const id = parseInt(grabbedCardEl.dataset.id);
            drawnCards.push(TAROT_DATA[id]);
            
            const dots = document.querySelectorAll('#progress-dots div');
            drawnCards.forEach((_, i) => {
                dots[i].style.background = "#ffcc33";
                dots[i].style.boxShadow = "0 0 15px #ffcc33";
                dots[i].style.borderColor = "#ffcc33";
            });

            grabbedCardEl.classList.add('card-dissipating');
            
            setTimeout(() => {
                if(grabbedCardEl) {
                    grabbedCardEl.remove();
                    grabbedCardEl = null;
                }
                isLocking = false;
                speed = 20; 
                if(drawnCards.length >= 3) {
                    prepareReport();
                } else {
                    document.getElementById('status-tag').innerText = `已获取 ${drawnCards.length}/3`;
                }
            }, 1200);
        }

        async function prepareReport() {
            const overlay = document.getElementById('decoding-overlay');
            const statusText = document.getElementById('decode-status');
            overlay.style.display = 'flex';
            statusText.innerText = "正在链接宇宙...";
            
            const prompt = `用户的问题是：“${userQuestion}”。
            抽到的三张牌如下：
            1. 现状：${drawnCards[0].name} (${drawnCards[0].desc})
            2. 挑战：${drawnCards[1].name} (${drawnCards[1].desc})
            3. 未来：${drawnCards[2].name} (${drawnCards[2].desc})
            请结合卡牌含义，对用户的问题进行深度解答和建议。请直接输出占卜建议文本，不要输出任何关于思考过程的内容。`;

            const aiInsightPromise = callMinimax(prompt);
            const [aiResult] = await Promise.all([
                aiInsightPromise,
                new Promise(resolve => setTimeout(resolve, 2500))
            ]);

            overlay.style.display = 'none';
            showFinalReport(aiResult);
        }

        function showFinalReport(aiContent) {
            document.getElementById('stage-draw').classList.remove('active');
            document.getElementById('stage-report').classList.add('active');
            document.getElementById('ai-text-content').innerText = aiContent;

            const list = document.getElementById('card-results-display');
            list.innerHTML = ""; 

            drawnCards.forEach((card, i) => {
                const stageName = i === 0 ? "现状" : i === 1 ? "挑战" : "未来";
                // 卡牌大小缩小为 1/3 (w-14 h-24 左右)
                list.innerHTML += `
                    <div class="flex flex-col items-center opacity-0 translate-y-6 transition-all duration-1000" style="transition-delay: ${i*400}ms">
                        <div class="w-14 h-24 md:w-16 md:h-28 bg-white rounded-lg flex flex-col items-center justify-center p-2 text-black shadow-lg mb-3 transform hover:scale-110 transition-transform duration-500">
                            <div class="text-2xl md:text-3xl mb-1">${card.emoji}</div>
                            <div class="w-4 h-0.5 bg-gray-200 mb-1"></div>
                            <div class="text-[8px] md:text-[10px] font-bold text-center">${card.name}</div>
                        </div>
                        <div class="text-center px-1 w-full max-w-[100px]">
                            <div class="text-[#ffcc33] text-[8px] tracking-[0.1em] mb-1 font-bold uppercase">${stageName}</div>
                            <p class="text-[#f0e6cc]/80 text-[10px] italic leading-tight">“${card.desc}”</p>
                        </div>
                    </div>
                `;
            });
            
            setTimeout(() => {
                list.querySelectorAll('.opacity-0').forEach(el => el.classList.remove('opacity-0', 'translate-y-6'));
            }, 100);

            setTimeout(() => {
                const btnArea = document.getElementById('unlock-ai-btn-area');
                btnArea.classList.remove('hidden');
                setTimeout(() => btnArea.classList.remove('opacity-0'), 50);
            }, 1600);
        }

        function revealAIInsight() {
            const btnArea = document.getElementById('unlock-ai-btn-area');
            const box = document.getElementById('ai-summary-box');
            btnArea.style.opacity = '0';
            setTimeout(() => {
                btnArea.classList.add('hidden');
                box.classList.remove('hidden');
                setTimeout(() => {
                    box.classList.remove('opacity-0', 'translate-y-8');
                    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 50);
            }, 500);
        }

        async function callMinimax(prompt) {
            const url = "https://api.minimaxi.com/v1/chat/completions";
            const payload = {
                model: modelName,
                messages: [
                    {
                        role: "system",
                        content: "你是一位精通塔罗占卜的占星大师。语气优雅、神秘、有启发性。请根据三张牌进行整合解析，200-300字。严禁输出任何 <thought> 标签内的思考过程或模型分析逻辑，只返回占卜结果文本。"
                    },
                    { role: "user", content: prompt }
                ]
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.choices && result.choices.length > 0) {
                        return result.choices[0].message.content;
                    }
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return "链接星空的路径已断开，请通过心之眼自行解读。";
        }

        function initAI() {
            const video = document.getElementById('v-preview');
            const cursor = document.getElementById('custom-cursor');
            let lastX = null;
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7});
            hands.onResults((res) => {
                if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    const h = res.multiHandLandmarks[0];
                    const x = (1 - h[0].x) * window.innerWidth;
                    const y = h[0].y * window.innerHeight;
                    cursor.style.left = `${x}px`; cursor.style.top = `${y}px`;
                    cursor.style.opacity = 1;
                    const isFist = [8, 12, 16, 20].every(i => h[i].y > h[i-2].y);
                    if(isFist && !cursor.classList.contains('grabbing')) {
                        cursor.classList.add('grabbing'); handleGrab();
                    } else if(!isFist && cursor.classList.contains('grabbing')) {
                        cursor.classList.remove('grabbing'); handleRelease();
                    }
                    if(lastX !== null && !grabbedCardEl) {
                        const dx = Math.abs(h[0].x - lastX);
                        if(dx > 0.02) speed = Math.min(speed + dx*80, 40);
                    }
                    lastX = h[0].x;
                } else { cursor.style.opacity = 0; }
            });
            new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            }).start();
        }

        window.onload = initStars;
    </script>
</body>
