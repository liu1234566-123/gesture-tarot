<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运之轮 - 手势塔罗交互</title>
    
    <!-- 引入 MediaPipe 手势识别库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --gold: #daa520;
            --purple: #4b0082;
            --dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); overflow: hidden; font-family: "Microsoft YaHei", serif; color: #fff; width: 100vw; height: 100vh; }

        /* 隐藏原始视频流 */
        .input_video { display: none; }

        /* 粒子背景画布 */
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* 手势光标反馈 */
        #cursor {
            position: absolute;
            width: 30px; height: 30px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        #cursor.fist { width: 50px; height: 50px; background: radial-gradient(circle, #ff4500 0%, transparent 70%); }

        /* UI 提示层 */
        #ui {
            position: absolute; top: 40px; width: 100%; text-align: center; z-index: 50;
            pointer-events: none;
        }
        h1 { font-size: 26px; color: var(--gold); letter-spacing: 8px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(218,165,32,0.5); }
        #hint { font-size: 16px; opacity: 0.7; letter-spacing: 2px; }

        /* 塔罗牌展示区 */
        #stage {
            position: absolute; top: 50%; left: 0; width: 100%; height: 400px;
            transform: translateY(-50%); perspective: 1500px; z-index: 10;
        }
        #track {
            position: absolute; left: 50%; display: flex; gap: 40px;
            transform-style: preserve-3d; will-change: transform;
        }

        /* 塔罗牌单体 */
        .card {
            width: 200px; height: 320px; flex-shrink: 0;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        /* 选中翻转状态 */
        .card.active {
            transform: rotateY(180deg) scale(1.4) translateZ(100px);
            z-index: 1000;
            box-shadow: 0 0 40px rgba(218,165,32,0.4);
        }
        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 2px solid var(--gold); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        /* 卡背 */
        .back {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(218,165,32,0.05) 10px, rgba(218,165,32,0.05) 20px);
        }
        .back::after { content: "✧"; font-size: 60px; color: var(--gold); opacity: 0.4; }
        
        /* 卡面 */
        .front {
            background: #fff9f0; color: #2c1e16; transform: rotateY(180deg);
            padding: 20px; text-align: center;
        }
        .symbol { font-size: 70px; margin-bottom: 15px; }
        .name { font-weight: bold; font-size: 20px; text-transform: uppercase; border-bottom: 1px solid #2c1e16; padding-bottom: 5px; }

        /* 加载界面 */
        #loader {
            position: fixed; inset: 0; background: var(--dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px; color:var(--gold); letter-spacing: 2px;">开启命运之眼 (正在初始化摄像头)...</p>
    </div>

    <div id="ui">
        <h1>THE WHEEL OF FATE</h1>
        <p id="hint">向左挥手：加速滚动 | 握紧拳头：揭晓命运之牌</p>
    </div>

    <div id="cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="stage">
        <div id="track"></div>
    </div>

    <video class="input_video" playsinline></video>

    <script>
        const tarotCards = [
            { name: "愚者", sym: "🃏" }, { name: "魔术师", sym: "🪄" }, { name: "女祭司", sym: "🌙" },
            { name: "皇后", sym: "👑" }, { name: "皇帝", sym: "🦅" }, { name: "教皇", sym: "⛪" },
            { name: "恋人", sym: "❤️" }, { name: "战车", sym: "🐎" }, { name: "力量", sym: "🦁" },
            { name: "隐士", sym: "🏮" }, { name: "命运之轮", sym: "☸️" }, { name: "正义", sym: "⚖️" },
            { name: "倒吊人", sym: "🪢" }, { name: "死亡", sym: "💀" }, { name: "节制", sym: "🕊️" },
            { name: "恶魔", sym: "🐐" }, { name: "高塔", sym: "🌩️" }, { name: "星星", sym: "⭐" },
            { name: "月亮", sym: "🌚" }, { name: "太阳", sym: "☀️" }, { name: "审判", sym: "📯" }, { name: "世界", sym: "🌍" }
        ];

        // 1. 初始化 DOM 轨道 (三倍重复以实现无限滚动)
        const track = document.getElementById('track');
        const displayList = [...tarotCards, ...tarotCards, ...tarotCards];
        const cardW = 200, gap = 40;
        const itemStep = cardW + gap;

        displayList.forEach((data, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="face back"></div>
                <div class="face front">
                    <div class="symbol">${data.sym}</div>
                    <div class="name">${data.name}</div>
                </div>
            `;
            track.appendChild(card);
        });

        const cardEls = document.querySelectorAll('.card');

        // 2. 交互状态变量
        let scrollX = -(tarotCards.length * itemStep); // 初始偏移
        let currentVel = -1.5;
        let isFastMode = false;
        let fistActive = false;
        let snapPos = null;
        let currentSelected = null;
        let handCoord = { x: 0, y: 0 };
        let lastHandX = 0;

        // 3. 背景粒子系统
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.8,
                vy: (Math.random() - 0.5) * 0.8,
                size: Math.random() * 2 + 1
            }));
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(147, 112, 219, 0.5)";
            particles.forEach(p => {
                let dx = handCoord.x - p.x;
                let dy = handCoord.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 180) {
                    p.x -= dx / 20;
                    p.y -= dy / 20;
                }
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = canvas.width; else if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height; else if(p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        // 4. 动画循环
        function mainLoop() {
            if (fistActive) {
                // 握拳模式：平滑吸附到选中的卡牌
                if (snapPos !== null) {
                    scrollX += (snapPos - scrollX) * 0.12;
                }
            } else {
                // 滚动模式
                let targetVel = isFastMode ? -16 : -1.5;
                currentVel += (targetVel - currentVel) * 0.05;
                scrollX += currentVel;

                // 无限滚动边界检查
                const loopDist = tarotCards.length * itemStep;
                if (scrollX < -loopDist * 2) scrollX += loopDist;
                if (scrollX > -loopDist) scrollX -= loopDist;
                
                // 清除选中
                if(currentSelected) {
                    currentSelected.classList.remove('active');
                    currentSelected = null;
                }
                snapPos = null;
            }

            track.style.transform = `translateX(${scrollX}px)`;
            requestAnimationFrame(mainLoop);
        }

        // 5. 手势识别逻辑
        const video = document.querySelector('.input_video');
        const cursor = document.getElementById('cursor');

        function onHandResults(results) {
            document.getElementById('loader').style.opacity = 0;
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const marks = results.multiHandLandmarks[0];
                const x = (1 - marks[9].x) * window.innerWidth;
                const y = marks[9].y * window.innerHeight;
                
                handCoord.x = x; handCoord.y = y;
                cursor.style.opacity = 1;
                cursor.style.left = x + 'px';
                cursor.style.top = y + 'px';

                // 握拳检测：判断食指尖(8)和中指尖(12)到掌心(9)的距离
                const d8 = Math.hypot(marks[8].x - marks[5].x, marks[8].y - marks[5].y);
                const d12 = Math.hypot(marks[12].x - marks[9].x, marks[12].y - marks[9].y);
                const isNowFist = (d8 < 0.06 && d12 < 0.06);

                if (isNowFist && !fistActive) {
                    fistActive = true;
                    isFastMode = false;
                    cursor.classList.add('fist');
                    
                    // 计算哪张牌最靠近中心
                    const viewportCenter = window.innerWidth / 2;
                    let minD = Infinity;
                    let bestIdx = 0;
                    cardEls.forEach((el, i) => {
                        const cardCenter = scrollX + (i * itemStep) + cardW/2 + viewportCenter;
                        const d = Math.abs(cardCenter - viewportCenter);
                        if(d < minD) { minD = d; bestIdx = i; }
                    });
                    
                    snapPos = -(bestIdx * itemStep) - cardW/2;
                    currentSelected = cardEls[bestIdx];
                    currentSelected.classList.add('active');
                } else if (!isNowFist && fistActive) {
                    fistActive = false;
                    cursor.classList.remove('fist');
                }

                // 快速划动检测
                if (!fistActive) {
                    const deltaX = x - lastHandX;
                    if (deltaX < -18) isFastMode = true; // 向左快划
                    if (deltaX > 18) isFastMode = false; // 向右快划取消
                }
                lastHandX = x;
            } else {
                cursor.style.opacity = 0;
            }
        }

        // 初始化 MediaPipe
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        const camera = new Camera(video, {
            onFrame: async () => await hands.send({image: video}),
            width: 1280, height: 720
        });

        window.onload = () => {
            initParticles();
            drawParticles();
            mainLoop();
            camera.start();
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
