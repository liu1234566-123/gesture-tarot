<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运之眼 - 手势交互塔罗</title>
    
    <!-- 加载 MediaPipe 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --gold: #daa520;
            --purple: #4b0082;
            --dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); overflow: hidden; font-family: "Microsoft YaHei", serif; color: #fff; }

        /* 视频流隐藏 */
        .input_video { display: none; }

        /* 背景画布 */
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 手势光标 */
        #cursor {
            position: absolute;
            width: 30px; height: 30px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            opacity: 0;
        }
        #cursor.fist { transform: translate(-50%, -50%) scale(2); background: radial-gradient(circle, #ff4500 0%, transparent 70%); }

        /* UI 层 */
        #ui {
            position: absolute; top: 5%; width: 100%; text-align: center; z-index: 50;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }
        h1 { font-size: 24px; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        #hint { font-size: 16px; opacity: 0.8; }

        /* 塔罗牌轨道 */
        #stage {
            position: absolute; top: 50%; left: 0; width: 100%; height: 400px;
            transform: translateY(-50%); perspective: 1200px; z-index: 10;
        }
        #track {
            position: absolute; left: 50%; display: flex; gap: 30px;
            transform-style: preserve-3d; will-change: transform;
        }

        /* 单张卡牌 */
        .card {
            width: 200px; height: 320px; flex-shrink: 0;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card.active {
            transform: rotateY(180deg) scale(1.4) translateZ(100px);
            z-index: 1000;
        }
        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            border: 2px solid var(--gold); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .back {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(218,165,32,0.1) 5px, rgba(218,165,32,0.1) 10px);
        }
        .back::after { content: "✺"; font-size: 60px; color: var(--gold); opacity: 0.5; }
        
        .front {
            background: #fdf5e6; color: #2c1e16; transform: rotateY(180deg);
            padding: 20px; text-align: center;
        }
        .symbol { font-size: 60px; margin-bottom: 20px; }
        .name { font-weight: bold; font-size: 18px; border-bottom: 1px solid #2c1e16; }

        /* 加载动画 */
        #loader {
            position: fixed; inset: 0; background: var(--dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px; color:var(--gold)">正在感知时空维度 (加载摄像头与模型)...</p>
    </div>

    <div id="ui">
        <h1>THE EYES OF FATE</h1>
        <p id="hint">向左挥手：加速滚动 | 握紧拳头：揭晓命运</p>
    </div>

    <div id="cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="stage">
        <div id="track"></div>
    </div>

    <video class="input_video"></video>

    <script>
        const cardsData = [
            { n: "愚者", s: "🃏" }, { n: "魔术师", s: "🪄" }, { n: "女祭司", s: "🌙" },
            { n: "皇后", s: "👑" }, { n: "皇帝", s: "🦅" }, { n: "教皇", s: "⛪" },
            { n: "恋人", s: "❤️" }, { n: "战车", s: "🐎" }, { n: "力量", s: "🦁" },
            { n: "隐士", s: "🏮" }, { n: "命运之轮", s: "☸️" }, { n: "正义", s: "⚖️" },
            { n: "倒吊人", s: "🪢" }, { n: "死亡", s: "💀" }, { n: "节制", s: "🕊️" },
            { n: "恶魔", s: "🐐" }, { n: "高塔", s: "🌩️" }, { n: "星星", s: "⭐" },
            { n: "月亮", s: "🌚" }, { n: "太阳", s: "☀️" }, { n: "审判", s: "📯" }, { n: "世界", s: "🌍" }
        ];

        // 1. 初始化卡牌
        const track = document.getElementById('track');
        const fullDeck = [...cardsData, ...cardsData, ...cardsData]; // 三倍填充实现循环
        const cardW = 200, gap = 30;
        const step = cardW + gap;

        fullDeck.forEach(data => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div class="face back"></div>
                <div class="face front">
                    <div class="symbol">${data.s}</div>
                    <div class="name">${data.n}</div>
                </div>
            `;
            track.appendChild(el);
        });

        const cardElements = document.querySelectorAll('.card');

        // 2. 交互状态
        let scrollX = -(cardsData.length * step);
        let velocity = -1.5;
        let isFast = false;
        let isFist = false;
        let snapX = null;
        let activeCard = null;
        let handPos = { x: 0, y: 0 };
        let prevX = 0;

        // 3. 粒子系统
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({length: 150}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 1,
                vy: (Math.random() - 0.5) * 1,
                size: Math.random() * 2 + 1
            }));
        }

        function drawParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(147, 112, 219, 0.6)";
            particles.forEach(p => {
                let dx = handPos.x - p.x;
                let dy = handPos.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) {
                    p.x -= dx / 15;
                    p.y -= dy / 15;
                }
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = canvas.width; if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height; if(p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        // 4. 动画主循环
        function update() {
            if (isFist) {
                if (snapX !== null) {
                    scrollX += (snapX - scrollX) * 0.1;
                }
            } else {
                let targetV = isFast ? -15 : -1.5;
                velocity += (targetV - velocity) * 0.05;
                scrollX += velocity;

                // 循环逻辑
                const limit = cardsData.length * step;
                if (scrollX < -limit * 2) scrollX += limit;
                if (scrollX > -limit) scrollX -= limit;
                
                if(activeCard) {
                    activeCard.classList.remove('active');
                    activeCard = null;
                }
                snapX = null;
            }

            track.style.transform = `translateX(${scrollX}px)`;
            requestAnimationFrame(update);
        }

        // 5. 手势识别
        const video = document.querySelector('.input_video');
        const cursor = document.getElementById('cursor');

        function onResults(results) {
            document.getElementById('loader').style.opacity = 0;
            setTimeout(()=>document.getElementById('loader').style.display='none', 500);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const marks = results.multiHandLandmarks[0];
                const x = (1 - marks[9].x) * window.innerWidth;
                const y = marks[9].y * window.innerHeight;
                
                handPos.x = x; handPos.y = y;
                cursor.style.opacity = 1;
                cursor.style.left = x + 'px';
                cursor.style.top = y + 'px';

                // 判断握拳 (食指指尖到掌心的距离)
                const dist = Math.hypot(marks[8].x - marks[5].x, marks[8].y - marks[5].y);
                const newFist = dist < 0.05;

                if (newFist && !isFist) {
                    isFist = true;
                    isFast = false;
                    cursor.classList.add('fist');
                    // 计算吸附
                    let center = window.innerWidth / 2;
                    let closestDist = Infinity;
                    let closestIdx = 0;
                    cardElements.forEach((el, i) => {
                        let elX = scrollX + (i * step) + cardW/2 + center;
                        let d = Math.abs(elX - center);
                        if(d < closestDist) { closestDist = d; closestIdx = i; }
                    });
                    snapX = -(closestIdx * step) - cardW/2;
                    activeCard = cardElements[closestIdx];
                    activeCard.classList.add('active');
                } else if (!newFist && isFist) {
                    isFist = false;
                    cursor.classList.remove('fist');
                }

                // 滑动判断
                if (!isFist) {
                    let dx = x - prevX;
                    if (dx < -15) isFast = true;
                    if (dx > 15) isFast = false;
                }
                prevX = x;
            } else {
                cursor.style.opacity = 0;
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => await hands.send({image: video}),
            width: 1280, height: 720
        });

        window.onload = () => {
            initParticles();
            drawParticles();
            update();
            camera.start();
        };
    </script>
</body>
</html>
