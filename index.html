<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星语占卜 - 命运之指引</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
    margin:0;
    background:#030308;
    color:#f0e6cc;
    font-family:serif;
    overflow:hidden;
}
.stage{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}
.stage.active{display:flex;}
.tarot-card{
    position:absolute;
    width:200px;height:320px;
    border-radius:12px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
}
.card-front{display:none;}
.is-flipped .card-front{display:block;}
.card-dissipating{
    opacity:0;
    transform:translateY(-200px) scale(0.2)!important;
    transition:1s;
}
</style>
</head>

<body>

<!-- 输入 -->
<div id="stage-input" class="stage active">
    <input id="q-input" placeholder="输入问题..." style="padding:10px;font-size:20px">
    <button onclick="onStart()">开始占卜</button>
</div>

<!-- 抽卡 -->
<div id="stage-draw" class="stage">
    <div id="cards-track"></div>
</div>

<!-- 结果 -->
<div id="stage-report" class="stage">
    <div id="report-list"></div>
    <button onclick="location.reload()">重新开始</button>
</div>

<video id="v-preview" style="display:none"></video>

<script>
const TAROT_DATA = [
{ name:"愚者",emoji:"🃏",desc:"新的开始",detail:"勇敢出发" },
{ name:"魔术师",emoji:"🧙",desc:"创造力",detail:"行动吧" },
{ name:"女教皇",emoji:"🌙",desc:"直觉",detail:"倾听内心" },
{ name:"太阳",emoji:"☀️",desc:"成功",detail:"一切顺利" }
];

let drawnCards=[];
let grabbedCardEl=null;
let isLocking=false;
let lastTime=0;

const COOLDOWN=600;
const TOTAL=20;
const GAP=220;
const WIDTH=TOTAL*GAP;

let offset=0;
let speed=2;

function canTrigger(){
    let now=Date.now();
    if(now-lastTime<COOLDOWN) return false;
    lastTime=now;
    return true;
}

function onStart(){
    document.getElementById("stage-input").classList.remove("active");
    document.getElementById("stage-draw").classList.add("active");
    createTrack();
    initAI();
    loop();
}

function createTrack(){
    let track=document.getElementById("cards-track");
    track.innerHTML="";
    for(let i=0;i<TOTAL;i++){
        let d=TAROT_DATA[i%TAROT_DATA.length];
        let div=document.createElement("div");
        div.className="tarot-card";
        div.dataset.id=i;
        div.innerHTML=`<div>${d.emoji}</div>`;
        track.appendChild(div);
    }
}

function loop(){
    if(!grabbedCardEl){
        offset-=speed;
        if(Math.abs(offset)>=WIDTH) offset=0;
    }

    document.querySelectorAll(".tarot-card:not(.card-dissipating)").forEach((el,i)=>{
        if(el===grabbedCardEl) return;
        let x=(i*GAP+offset)%WIDTH;
        el.style.transform=`translateX(${x}px)`;
    });

    requestAnimationFrame(loop);
}

function handleGrab(){
    if(grabbedCardEl||isLocking||drawnCards.length>=3) return;

    let target=[...document.querySelectorAll(".tarot-card")][0];
    grabbedCardEl=target;
    grabbedCardEl.style.transform="translateX(0) scale(1.2)";
}

function handleRelease(){
    if(!grabbedCardEl||isLocking||drawnCards.length>=3) return;

    isLocking=true;

    let id=parseInt(grabbedCardEl.dataset.id);
    drawnCards.push(TAROT_DATA[id%TAROT_DATA.length]);

    grabbedCardEl.classList.add("card-dissipating");

    setTimeout(()=>{
        grabbedCardEl.remove();
        grabbedCardEl=null;
        isLocking=false;

        if(drawnCards.length===3){
            showReport();
        }
    },800);
}

function showReport(){
    document.getElementById("stage-draw").classList.remove("active");
    document.getElementById("stage-report").classList.add("active");

    let list=document.getElementById("report-list");
    list.innerHTML="";

    drawnCards.forEach((c,i)=>{
        let div=document.createElement("div");
        div.style.margin="20px";
        div.innerHTML=`
            <h2>${c.emoji} ${c.name}</h2>
            <p>${c.desc}</p>
            <p>${c.detail}</p>
        `;
        list.appendChild(div);
    });
}

function initAI(){
    const video=document.getElementById("v-preview");

    const hands=new Hands({
        locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    hands.setOptions({
        maxNumHands:1,
        minDetectionConfidence:0.7
    });

    hands.onResults((res)=>{
        if(res.multiHandLandmarks?.length){
            const h=res.multiHandLandmarks[0];
            const isFist=[8,12,16,20].every(i=>h[i].y>h[i-2].y);

            if(isFist && canTrigger()) handleGrab();
            else if(!isFist && canTrigger()) handleRelease();
        }
    });

    new Camera(video,{
        onFrame:async()=>{await hands.send({image:video})},
        width:640,height:480
    }).start();
}
</script>

</body>
</html>
