<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 虚拟试衣间 - 纯前端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const API_KEY = ""; // 运行时由环境自动填充

        const SHOP_ITEMS = [
            { id: 1, name: "简约白T恤", category: "上衣", prompt: "a clean white premium cotton t-shirt, modern fit" },
            { id: 2, name: "深蓝商务西装", category: "外套", prompt: "a sharp navy blue professional business suit jacket" },
            { id: 3, name: "复古夏威夷衬衫", category: "上衣", prompt: "a vintage hawaiian shirt with floral patterns" },
            { id: 4, name: "黑色连帽卫衣", category: "上衣", prompt: "a comfortable black oversized hoodie" },
            { id: 5, name: "红色波点连衣裙", category: "全套", prompt: "a stylish red polka dot summer dress" },
        ];

        function App() {
            const [stream, setStream] = useState(null);
            const [capturedImage, setCapturedImage] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [resultImage, setResultImage] = useState(null);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('camera');

            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, capturedImage, resultImage, isGenerating]);

            useEffect(() => {
                async function setupCamera() {
                    try {
                        const mediaStream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: 'user' } 
                        });
                        setStream(mediaStream);
                        if (videoRef.current) {
                            videoRef.current.srcObject = mediaStream;
                        }
                    } catch (err) {
                        setError("无法访问摄像头，请确保已授权。");
                    }
                }
                if (activeTab === 'camera' && !capturedImage) {
                    setupCamera();
                }
                return () => {
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            }, [activeTab, capturedImage]);

            const capturePhoto = () => {
                const canvas = canvasRef.current;
                const video = videoRef.current;
                if (canvas && video) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    const dataUrl = canvas.toDataURL('image/png');
                    setCapturedImage(dataUrl);
                    setActiveTab('shop');
                }
            };

            const generateFitting = async () => {
                if (!capturedImage || !selectedItem) return;
                setIsGenerating(true);
                setError(null);
                setActiveTab('result');

                try {
                    const base64Data = capturedImage.split(',')[1];
                    const prompt = `Please dress the person in this image with this specific item: ${selectedItem.name}. The style should be: ${selectedItem.prompt}. Maintain the person's body shape, pose, and background as much as possible, just realistically replace their current clothing with the new one.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: "image/png", data: base64Data } }
                                ]
                            }],
                            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                        })
                    });

                    if (!response.ok) throw new Error('AI 生成失败，请检查网络或 API 配置。');

                    const result = await response.json();
                    const generatedBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (generatedBase64) {
                        setResultImage(`data:image/png;base64,${generatedBase64}`);
                    } else {
                        throw new Error('未能提取到生成的图像数据。');
                    }
                } catch (err) {
                    setError(err.message || "发生未知错误");
                    setActiveTab('shop');
                } finally {
                    setIsGenerating(false);
                }
            };

            const reset = () => {
                setCapturedImage(null);
                setSelectedItem(null);
                setResultImage(null);
                setActiveTab('camera');
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                            </div>
                            <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
                                AI 虚拟试衣间
                            </h1>
                        </div>
                        <button onClick={reset} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                            <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-500"></i>
                        </button>
                    </header>

                    <main className="flex-1 max-w-4xl mx-auto w-full p-4 md:p-6 flex flex-col gap-6">
                        <div className="flex bg-slate-200 p-1 rounded-xl">
                            {['camera', 'shop', 'result'].map((tab, idx) => (
                                <button 
                                    key={tab}
                                    disabled={tab === 'shop' && !capturedImage || tab === 'result' && !resultImage && !isGenerating}
                                    onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 ${activeTab === tab ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-600 disabled:opacity-50'}`}
                                >
                                    <span className="hidden sm:inline">{idx + 1}. {tab === 'camera' ? '拍摄身材' : tab === 'shop' ? '选择衣服' : '试衣结果'}</span>
                                    <span className="sm:hidden uppercase">{tab[0]}</span>
                                </button>
                            ))}
                        </div>

                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden min-h-[500px] border border-slate-100 relative">
                            {activeTab === 'camera' && (
                                <div className="h-full flex flex-col items-center justify-center p-6 gap-6">
                                    {capturedImage ? (
                                        <div className="relative w-full max-w-md aspect-[3/4] rounded-2xl overflow-hidden border-4 border-indigo-100">
                                            <img src={capturedImage} className="w-full h-full object-cover" />
                                            <button onClick={() => setCapturedImage(null)} className="absolute bottom-4 right-4 bg-white/90 backdrop-blur p-3 rounded-full shadow-lg">
                                                <i data-lucide="refresh-cw" class="w-5 h-5 text-indigo-600"></i>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="relative w-full max-w-md aspect-[3/4] bg-black rounded-2xl overflow-hidden shadow-2xl">
                                            <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover scale-x-[-1]" />
                                            <button onClick={capturePhoto} className="absolute bottom-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full border-4 border-slate-300 shadow-xl flex items-center justify-center active:scale-95">
                                                <div className="w-12 h-12 bg-white border-2 border-slate-800 rounded-full"></div>
                                            </button>
                                        </div>
                                    )}
                                    <div className="text-center">
                                        <p className="font-semibold text-lg text-slate-800">第一步：拍摄一张全身或半身照</p>
                                        <p className="text-sm text-slate-500">请确保光线充足，露出你的身材轮廓。</p>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'shop' && (
                                <div className="p-6 h-full flex flex-col gap-6">
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800">
                                        <i data-lucide="shopping-bag" class="text-indigo-600"></i> 选购你的单品
                                    </h2>
                                    <div className="grid grid-cols-2 gap-4 flex-1 overflow-y-auto pr-2" style={{maxHeight: '400px'}}>
                                        {SHOP_ITEMS.map((item) => (
                                            <div 
                                                key={item.id}
                                                onClick={() => setSelectedItem(item)}
                                                className={`group cursor-pointer rounded-2xl border-2 p-4 transition-all relative ${selectedItem?.id === item.id ? 'border-indigo-600 bg-indigo-50/50' : 'border-slate-100 hover:border-indigo-200 hover:bg-slate-50'}`}
                                            >
                                                <div className="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-400 group-hover:scale-105 transition-transform">
                                                    <i data-lucide="shirt" class="w-10 h-10 stroke-1"></i>
                                                </div>
                                                <p className="font-bold text-slate-800 text-sm">{item.name}</p>
                                                <p className="text-[10px] text-slate-500 uppercase mt-1 tracking-tighter">{item.category}</p>
                                                {selectedItem?.id === item.id && (
                                                    <div className="absolute top-3 right-3 bg-indigo-600 text-white p-1 rounded-full shadow-md">
                                                        <i data-lucide="check" class="w-3 h-3"></i>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={generateFitting}
                                        disabled={!selectedItem}
                                        className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-indigo-700 disabled:opacity-50 flex items-center justify-center gap-3 transition-all"
                                    >
                                        <i data-lucide="sparkles"></i> 立即虚拟试穿
                                    </button>
                                </div>
                            )}

                            {activeTab === 'result' && (
                                <div className="h-full flex flex-col items-center justify-center p-6 gap-6">
                                    {isGenerating ? (
                                        <div className="flex flex-col items-center gap-6 text-center animate-in fade-in duration-500">
                                            <div className="w-20 h-20 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800">AI 裁缝正在制作中...</h3>
                                                <p className="text-slate-500 mt-2">正在将 {selectedItem?.name} 贴合你的身材</p>
                                            </div>
                                        </div>
                                    ) : resultImage ? (
                                        <div className="flex flex-col items-center gap-6 w-full animate-in zoom-in duration-500">
                                            <div className="relative w-full max-w-md aspect-[3/4] rounded-2xl overflow-hidden shadow-2xl border-4 border-white">
                                                <img src={resultImage} className="w-full h-full object-cover" />
                                                <div className="absolute top-4 left-4 bg-black/50 backdrop-blur px-3 py-1 rounded-full text-white text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                                                    <i data-lucide="sparkles" class="w-3 h-3"></i> AI 生成效果
                                                </div>
                                            </div>
                                            <div className="flex gap-4 w-full max-w-md">
                                                <button onClick={() => setActiveTab('shop')} className="flex-1 py-3 bg-slate-100 text-slate-800 rounded-xl font-semibold hover:bg-slate-200">换一件</button>
                                                <button className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold shadow-lg hover:bg-indigo-700">加入购物车</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center p-8">
                                            {error && <div className="text-red-500 bg-red-50 p-4 rounded-xl border border-red-100">{error}</div>}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="p-6 text-center text-slate-400 text-[10px]">
                        &copy; 2024 AI Fashion Studio &middot; 纯前端离线原型
                    </footer>
                    <canvas ref={canvasRef} className="hidden" />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
